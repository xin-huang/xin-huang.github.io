<!DOCTYPE html>
	<html>
		<head>
			<title>{{ page.title }}</title>
			<!-- link to main stylesheet -->
			<link rel="stylesheet" type="text/css" href="/css/main.css">
            <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
            {% if page.use_math %}
                {% include mathjax_support.html %}
            {% endif %}
		</head>
		<body>
			<nav>
	    		<ul>
	        		<li><a href="/">Home</a></li>
                    <li><a href="/notes">Notes</a></li>
                    <li><a href="/videos/">Videos</a></li>
				    <li><a href="/cv/MyCV.pdf">CV</a></li>
	    		</ul>
			</nav>
			<div class="container">
			
			{{ content }}
			
			</div><!-- /.container -->
			<footer>
	    		<ul>
                    {% if site.github_username %}
	        		<li><a href="https://github.com/{{ site.github_username }}">
                        <i class="fa fa-github"></i></a></li>
                    {% endif %}
				    <li><a href="https://www.researchgate.net/profile/Xin_Huang39">Research Gate</a></li>
				    <li><a href="http://orcid.org/{{ site.orcid }}">
                        <img src="https://orcid.org/sites/default/files/images/orcid_32x32.png">
                        </a></li>
                    <p class="poem">殘聲憑燭捻韶光，半掩孤幃懸錦囊。滿樹凋零無寄處，獨吟蕭索倦痴狂。</p>
                </ul>
			</footer>
		</body>
	</html>
