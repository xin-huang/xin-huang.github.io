<!-- d3.js v3 -->
<script src="http://d3js.org/d3.v3.min.js"></script>
<script src="http://d3js.org/topojson.v1.min.js"></script>
<script language="javascript">
    "use strict"
    var width = 960,
        height = 520;
        
    var projection = d3.geo.mercator()
            .center([-10, 30])
            .scale(150)
            .rotate([200, 0]);
        
    var svg = d3.select("#cover-image").append("svg")
            .attr("width", width)
            .attr("height", height)
            .style("display", "block")
            .style("margin", "auto");
        
    var path = d3.geo.path()
            .projection(projection);
        
    var g = svg.append("g").attr("id", "world-map");
        
    var defs = svg.append("defs");
        
    // set up color gradient for each migration path
    var color_gradient = [
        {id: "line_gradient_eaf2saf", start: "#401C04", end: "#622F1E"},
        {id: "line_gradient_eaf2waf", start: "#160900", end: "#401C04"},
        {id: "line_gradient_ooa", start: "#A98349", end: "#401C04"},
        {id: "line_gradient_me2aus", start: "#A98349", end: "#5E3021"},
        {id: "line_gradient_sas2eur", start: "#FFF9E3", end: "#A98349"},
        {id: "line_gradient_sas2eas1", start: "#A98349", end: "#A98349"},
        {id: "line_gradient_sas2eas2", start: "#D5AB4A", end: "#A98349"},
        {id: "line_gradient_eas2nas", start: "#DBC980", end: "#A98349"},
        {id: "line_gradient_nas2amr", start: "#DBC980", end: "#AD4805"},
    ];
        
     var gradient = function(color) {
         var gd = defs.append("linearGradient")
                .attr("id", color.id)
                .attr("x1", "0%")
                .attr("y1", "0%")
                .attr("x2", "0%")
                .attr("y2", "100%");
         gd.append("stop")
                .attr("class", "start")
                .attr("offset", "30%")
                .attr("stop-color", color.start)
                .attr("stop-opacity", 1);
         gd.append("stop")
                .attr("class", "end")
                .attr("offset", "100%")
                .attr("stop-color", color.end)
                .attr("stop-opacity", 1);
    };
        
    var i;
    for (i = 0; i < color_gradient.length; i++) {
            gradient(color_gradient[i]);
    }
        
    // load and display the world
    d3.json("/data/world-110m2.json", function(error, topology) {
        g.selectAll("path")
            .data(topojson.feature(topology, topology.objects.countries).features)
            .enter()
                .append("path")
                .attr("d", path)
    });
        
    // load the cities
    d3.csv("/data/cities.csv", function(error, data) {
        g.selectAll("circle")
            .data(data)
            .enter()
            .append("circle")
                  .attr("cx", function(d) { return projection([d.lon, d.lat])[0]; })
                  .attr("cy", function(d) { return projection([d.lon, d.lat])[1]; })
                  .attr("r", 5)
                  .attr("fill", "tomato")
            .on("mouseover", handleMouseOver)
            .on("mouseout", handleMouseOut);
            
        function handleMouseOver(d, i) {
            d3.select(this)
                .attr("fill", "gold");
            d3.select("#about").html(
                "<div class=\"row\">" +
                    "<div class=\"column\">" +
                        "<img src=" + d.img + " style=\"object-fit: contain; max-height: 200px\">" +
                    "</div>" +
                    "<div class=\"double-column\">" +
                        "<p style=\"font-size: 1.2em\">" + d.description + "</p>" +
                    "</div>" +
                "</div>"
            )
        };
            
        function handleMouseOut(d, i) {
            d3.select(this)
                .attr("fill", "tomato");
        };
            
    });
            
    // Animation for human migration and human skin pigmentation
    // human migration reference:
    // skin color reference:
    var mdata = [
        // East Africa to South Africa
        {id: "eaf2saf", points: [{lon: 36.18, lat: 3.53}, {lon: 28.04, lat: -26.20}], cs: color_gradient[0].start, ce: color_gradient[0].end, drt: 5000, dlt: 0}, 
        // East Africa to West Africa
        {id: "eaf2waf", points: [{lon: 36.18, lat: 3.53}, {lon: 7.46, lat: 9.06}], cs: color_gradient[1].start, ce: color_gradient[1].end, drt: 7000, dlt: 0},
        // Out of Africa
        {id: "ooa", points: [{lon: 36.18, lat: 3.53}, {lon: 51.52, lat: 25.29}], cs: color_gradient[2].end, ce: color_gradient[2].start, drt: 13000, dlt: 0},
        // South route to Australia
        {id: "me2aus", points: [{lon: 52.52, lat: 29.19}, 
               {lon: 72.84, lat: 21.18}, 
               {lon: 76.26, lat: 5.94}, 
               {lon: 90.40, lat: 30.76},
               {lon: 104.03, lat: -1.09}, 
               {lon: 145.77, lat: -16.92}], cs: color_gradient[3].start, ce: color_gradient[3].end, drt: 3000, dlt: 13000},
        // to Europe
        {id: "sas2eur", points: [{lon: 75.12, lat: 23.64}, {lon: -0.13, lat: 51.51}], cs: color_gradient[4].end, ce: color_gradient[4].start, drt: 2000, dlt: 13500},
        // to East Asia
        {id: "sas2eas1", points: [{lon: 75.12, lat: 23.64}, {lon: 90.40, lat: 25.76}], cs: color_gradient[5].start, ce: color_gradient[5].end, drt: 2000, dlt: 13500},
        {id: "sas2eas2", points: [{lon: 93.40, lat: 25.76}, {lon: 100.80, lat: 22.00}, {lon: 113.66, lat: 30.76}], cs: color_gradient[6].end, ce: color_gradient[6].start, drt: 1500, dlt: 15500},
        // to North Asia
        {id: "eas2nas", points: [{lon: 90.40, lat: 27.76}, 
               {lon: 116.92, lat: 57.92}, 
               {lon: -169.75, lat: 66.01}], cs: color_gradient[7].end, ce: color_gradient[7].start, drt: 2500, dlt: 15500},
        // to America
        {id: "nas2amr", points: [{lon: -166.07, lat: 66.26}, 
               {lon: -130.11, lat: 59.26},
               {lon: -84.28, lat: 30.44},
               {lon: -68.13, lat: -16.50}, 
               {lon: -72.07, lat: -45.57}], cs: color_gradient[8].start, ce: color_gradient[8].end, drt: 1000, dlt: 18000},
    ]
        
     var migration = function(id, points, cs, ce, drt, dlt) {
         var lineGenerator = d3.svg.line()
                .interpolate("basis")
                .x(function(d) { return projection([d.lon, d.lat])[0]; })
                .y(function(d) { return projection([d.lon, d.lat])[1]; })
            
         var line = svg.append("path")
                .attr("class", "line")
                .attr("id", id)
                .attr("d", lineGenerator(points));
            
         var arrow = svg.append("path")
                .attr("id", "arrow")
                .attr("d", d3.svg.symbol().type("triangle-down").size(200))
                .attr("fill", "none");
            
         var totalLength = line.node().getTotalLength();
            
         // animate the arrow
         arrow.transition()
                .duration(drt)
                .delay(dlt)
                .ease("linear")
                .attrTween("transform", translateAlong(line.node()))
                .attrTween("fill", function() { return d3.scale.linear().domain([0, 0.7, 1]).range([cs, ce, ce]); })
            
         // Helper function to calculate the position and angle for animating the arrow
         // Returns an attrTween for translating along the specified path element.
         function translateAlong(path) {
             var l = path.getTotalLength();
             return function(d, i, a) {
                 return function(t) {
                     var pos = t * l;
                     var p = path.getPointAtLength(pos);
                     var ps = path.getPointAtLength(Math.max(pos - 0.01,0));
                     var pe = path.getPointAtLength(pos + 0.01);
                     var angl = Math.atan2(pe.y - ps.y, pe.x - ps.x) * 180 / Math.PI - 90;
                     return "translate(" + p.x + "," + p.y + ") rotate(" + angl + ")";
                 };
             };
         }
            
         // animate the migration
         line.attr("stroke-dasharray", totalLength + " " + totalLength)
             .attr("stroke-dashoffset", totalLength)
             .transition()
                 .duration(drt)
                 .delay(dlt)
                 .ease("linear")
                 .attr("stroke-dashoffset", 0);
            
     }
        
     for (i = 0; i < mdata.length; i++) {
         migration(mdata[i].id, mdata[i].points, mdata[i].cs, mdata[i].ce, mdata[i].drt, mdata[i].dlt);
     }
</script>
